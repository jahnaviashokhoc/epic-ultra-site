name: Build & Deploy EPICUltra Site

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build site from content.md
        run: python3 build.py

      - name: Commit rebuilt HTML files
        run: |
          git config --global user.name "EPICUltra Bot"
          git config --global user.email "bot@epicultra.ai"
          git add *.html
          git diff --cached --quiet || git commit -m "🤖 Auto-rebuild site from content.md"
          git push
